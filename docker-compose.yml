# ============================================================
# Global Threat Monitor — Docker Compose
# ============================================================
# Usage:
#   docker compose up              (foreground)
#   docker compose up -d           (background / detached)
#   docker compose down            (stop and remove containers)
#   docker compose logs -f app     (follow logs)
# ============================================================

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: global-threat-monitor:latest
    container_name: global-threat-monitor
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3000
      - HOST=0.0.0.0
      - CLOUDFLARE_TOKEN=${CLOUDFLARE_TOKEN:-}
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN:-*}
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - threat-monitor-net

  # Optional: Nginx reverse proxy for production
  nginx:
    image: nginx:1.27-alpine
    container_name: global-threat-monitor-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - threat-monitor-net
    profiles:
      - nginx  # Only starts when: docker compose --profile nginx up

networks:
  threat-monitor-net:
    driver: bridge
